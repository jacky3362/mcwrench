name: refresh-docs

# Keep the committed plugin library current. Re-fetches each library entry from its canonical URL
# and opens a PR with the diffs for human review — never auto-merged, so pinned docs stay honest.

on:
  schedule:
    - cron: '0 4 * * 1' # weekly, Monday 04:00 UTC
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Single plugin name/alias to refresh (blank = all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with symlinks)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh library from canonical sources
        run: node scripts/refresh-library.mjs ${{ github.event.inputs.plugin }}

      - name: Validate still passes
        run: node scripts/validate.mjs

      - name: Open a PR with any doc diffs
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(library): refresh pinned plugin docs'
          title: 'chore(library): refresh pinned plugin docs'
          body: |
            Automated refresh of the committed plugin library from each entry's canonical URL.

            Review the diffs before merging — a bad upstream fetch or a moved docs page can change
            content. Close this PR if anything looks wrong.
          branch: chore/refresh-library
          delete-branch: true
          add-paths: |
            skills/learn-plugin-docs/library/**
